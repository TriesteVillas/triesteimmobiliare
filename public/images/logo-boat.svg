<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none" role="img" aria-label="TriesteImmobiliare">
  <!-- Origami barchetta — placeholder fedele al logo, da sostituire con SVG ufficiale -->
  <defs>
    <linearGradient id="sailDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d7aa0"/>
      <stop offset="100%" stop-color="#1f4a6d"/>
    </linearGradient>
    <linearGradient id="sailMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5e95b8"/>
      <stop offset="100%" stop-color="#2c5e80"/>
    </linearGradient>
    <linearGradient id="sailLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7daecd"/>
      <stop offset="100%" stop-color="#5e95b8"/>
    </linearGradient>
    <linearGradient id="hull" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f4a6d"/>
      <stop offset="100%" stop-color="#0d2942"/>
    </linearGradient>
  </defs>

  <!-- Hull (scafo trapezoidale invertito) -->
  <path d="M 18 56 L 102 56 L 90 72 L 30 72 Z" fill="url(#hull)"/>
  <!-- Sail right (vela destra, più scura) -->
  <path d="M 60 14 L 96 56 L 60 56 Z" fill="url(#sailDark)"/>
  <!-- Sail left base (parte sinistra base, blu medio) -->
  <path d="M 60 14 L 24 56 L 60 56 Z" fill="url(#sailMid)"/>
  <!-- Sail crease (piega centrale chiara) -->
  <path d="M 60 14 L 60 56 L 46 56 Z" fill="url(#sailLight)" opacity="0.85"/>
  <!-- Edge accent -->
  <path d="M 60 14 L 60 56" stroke="#0d2942" stroke-width="0.5" opacity="0.4"/>
</svg>
